name: Validate & Plan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-southeast-2

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install cfn-lint
      - run: cfn-lint templates/01-networking.yaml
      - run: cfn-lint templates/02-loadbalancer.yaml
      - run: cfn-lint templates/03-compute.yaml

  validate:
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - run: aws cloudformation validate-template --template-body file://templates/01-networking.yaml
      - run: aws cloudformation validate-template --template-body file://templates/02-loadbalancer.yaml
      - run: aws cloudformation validate-template --template-body file://templates/03-compute.yaml

  docker:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ha-nginx:latest
            ghcr.io/${{ github.repository_owner }}/ha-nginx:${{ github.sha }}
